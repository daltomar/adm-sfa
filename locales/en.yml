# Source locale (SPEC.md §6) and i18n fallback locale (SPEC.md §6.6 / T5).
#
# Key convention:
#   - `common.*`   — shared, context-free action words (Save, Cancel, Delete,
#                    …) reused verbatim across every view. Translate once.
#   - `sidebar.*`  — nav labels.
#   - `<view>.*`   — everything else, one section per ui/views/<file>.rs,
#                    in the order views appear in the sidebar.
#
# Note: the window title "Skateboard für alle" (main.rs) and the "adm-sfa"
# sidebar heading are the project's own name/brand, not UI chrome — they stay
# fixed literals in every locale, same as donor/recipient/category names
# (SPEC.md §6.1's entity-data exclusion).

